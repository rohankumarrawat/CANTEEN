name: Build Windows Installer

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # ── 1. Checkout ──────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Python setup ──────────────────────────────────────────────────────
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    # ── 3. Install Python dependencies ───────────────────────────────────────
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow
        pip install -r requirements.txt

    # ── 4. Generate App Icon (.ico) ──────────────────────────────────────────
    - name: Generate app icon
      run: |
        python make_icon.py app_icon.ico
        if (Test-Path app_icon.ico) {
          echo "✅ app_icon.ico generated successfully"
        } else {
          echo "❌ Icon generation failed"
          exit 1
        }

    # ── 5. Build EXE with PyInstaller ────────────────────────────────────────
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller build_exe.spec --clean --noconfirm

    # ── 6. Verify EXE output ─────────────────────────────────────────────────
    - name: Verify EXE was created
      run: |
        if (Test-Path "dist\AWWA_Lunch_Project.exe") {
          $size = (Get-Item "dist\AWWA_Lunch_Project.exe").length / 1MB
          echo "✅ EXE built successfully — $([math]::Round($size,1)) MB"
        } else {
          echo "❌ EXE not found — build failed"
          exit 1
        }

    # ── 7. Prepare database ──────────────────────────────────────────────────
    - name: Prepare canteen database
      run: |
        if (Test-Path canteen.db) {
          Copy-Item canteen.db dist\canteen.db
          $size = (Get-Item canteen.db).length / 1KB
          echo "✅ canteen.db ($([math]::Round($size,1)) KB) copied to dist\"
        } else {
          echo "ℹ️  No canteen.db — a fresh database will be created on first launch"
        }

    # ── 8. Copy icon to dist (needed by Inno Setup) ──────────────────────────
    - name: Copy icon to project root for Inno Setup
      run: |
        Copy-Item app_icon.ico dist\app_icon.ico -ErrorAction SilentlyContinue
        echo "Icon copied to dist for reference"

    # ── 9. Install Inno Setup ────────────────────────────────────────────────
    - name: Install Inno Setup
      run: |
        choco install innosetup --yes --no-progress
        echo "✅ Inno Setup installed"

    # ── 10. Build Windows Installer (.exe) ───────────────────────────────────
    - name: Compile Windows Installer with Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        if (Test-Path "installer_output\AWWA_Canteen_Setup_v5.exe") {
          $size = (Get-Item "installer_output\AWWA_Canteen_Setup_v5.exe").length / 1MB
          echo "✅ Installer created — $([math]::Round($size,1)) MB"
        } else {
          echo "❌ Installer not created"
          exit 1
        }

    # ── 11. Upload Installer as GitHub Artifact ───────────────────────────────
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: AWWA-Canteen-Windows-Installer
        path: installer_output/AWWA_Canteen_Setup_v5.exe
        if-no-files-found: error

    # ── 12. Summary ──────────────────────────────────────────────────────────
    - name: Build Summary
      run: |
        echo "============================================"
        echo "  AWWA Canteen — Build Complete!"
        echo "============================================"
        echo "  Installer: AWWA_Canteen_Setup_v5.exe"
        echo "  Download from the Actions Artifacts tab"
        echo "  Client just runs the installer:"
        echo "    - Install wizard guides them through"
        echo "    - Desktop shortcut is created"
        echo "    - Start Menu shortcut is created"
        echo "    - Uninstaller included"
        echo "============================================"
