name: Build Windows EXE

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub repository page

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # caching pip dependencies to speed up future runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller build_exe.spec --clean --noconfirm

    - name: Verify build output
      run: |
        if (Test-Path dist/AWWA_Lunch_Project.exe) {
          echo "Build successful! EXE found."
        } else {
          echo "Error: EXE not found!"
          exit 1
        }

    - name: Copy canteen.db next to EXE
      run: |
        # If a canteen.db exists in the repo (committed), copy it next to the exe.
        # If not, the app will auto-create a fresh one on first launch.
        if (Test-Path canteen.db) {
          Copy-Item canteen.db dist\canteen.db
          echo "canteen.db copied to dist folder."
        } else {
          echo "No canteen.db found in repo - client will get a fresh database on first run."
        }

    - name: Package EXE + database into a ZIP
      run: |
        Compress-Archive -Path dist\AWWA_Lunch_Project.exe, dist\canteen.db -DestinationPath dist\AWWA_Canteen_Install.zip -ErrorAction SilentlyContinue
        if (-not (Test-Path dist\AWWA_Canteen_Install.zip)) {
          # canteen.db might not exist, zip only the exe
          Compress-Archive -Path dist\AWWA_Lunch_Project.exe -DestinationPath dist\AWWA_Canteen_Install.zip
        }

    - name: Upload Complete Install Package
      uses: actions/upload-artifact@v4
      with:
        name: AWWA-Canteen-Windows-Package
        path: dist/AWWA_Canteen_Install.zip
        if-no-files-found: error
